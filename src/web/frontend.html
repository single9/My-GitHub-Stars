<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My GitHub Stars</title>
  <style>
    :root {
      --bg:          #0d1117;
      --bg2:         #161b22;
      --bg3:         #21262d;
      --border:      #30363d;
      --text:        #c9d1d9;
      --muted:       #8b949e;
      --accent:      #58a6ff;
      --green:       #3fb950;
      --yellow:      #e3b341;
      --purple:      #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 16px; color: var(--text); white-space: nowrap; }
    .header h1 span { color: var(--yellow); }
    .search-wrap { flex: 1; max-width: 400px; position: relative; }
    .search-input {
      width: 100%;
      padding: 6px 10px 6px 32px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 13px;
    }
    .badges { display: flex; gap: 8px; margin-left: auto; flex-shrink: 0; }
    .badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .badge strong { color: var(--text); }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 6px 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar-label {
      padding: 8px 14px 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .sidebar-divider { height: 1px; background: var(--border); margin: 6px 14px; }
    .cat-item {
      display: flex;
      align-items: center;
      padding: 5px 14px;
      cursor: pointer;
      gap: 7px;
      user-select: none;
    }
    .cat-item:hover { background: var(--bg3); }
    .cat-item.active { background: var(--bg3); }
    .cat-item.active .cat-name { color: var(--accent); }
    .cat-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
    .cat-count {
      font-size: 11px;
      color: var(--muted);
      background: var(--bg3);
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 22px;
      text-align: center;
    }
    .cat-item.active .cat-count {
      background: rgba(88,166,255,.12);
      color: var(--accent);
    }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 16px; }

    .repos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .repo-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color .15s, background .15s;
    }
    .repo-card:hover { border-color: var(--accent); background: var(--bg3); }
    .repo-name { font-weight: 600; color: var(--accent); font-size: 14px; line-height: 1.3; }
    .repo-owner { color: var(--muted); font-weight: 400; }
    .repo-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .repo-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .repo-lang { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    .lang-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .repo-stars { font-size: 12px; color: var(--muted); }
    .topic {
      font-size: 11px;
      background: rgba(88,166,255,.1);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* ── States ── */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .loading::after { content: ""; animation: dots 1.2s steps(3,end) infinite; display: inline-block; width: 18px; }
    @keyframes dots { 0%,100%{content:""} 33%{content:"."} 66%{content:".."}  100%{content:"..."} }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>⭐</span> My GitHub Stars</h1>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" class="search-input" type="text" placeholder="Search repos…" autocomplete="off" />
    </div>
    <div class="badges" id="badges"><div class="badge">Loading…</div></div>
  </div>

  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="cat-item active" data-id="" id="allItem" onclick="selectCat(null, this)">
        <span class="cat-name">All Repos</span>
        <span class="cat-count" id="allCount">—</span>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">Languages</div>
      <div id="langList"></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">Topics</div>
      <div id="topicList"></div>
    </div>

    <div class="content">
      <div id="main"><div class="loading">Loading</div></div>
    </div>
  </div>

  <script>
    const LANG_COLORS = {
      Rust:'#dea584',Python:'#3572A5',JavaScript:'#f1e05a',TypeScript:'#3178c6',
      Go:'#00ADD8',C:'#555555','C++':'#f34b7d','C#':'#178600',Java:'#b07219',
      Ruby:'#701516',Swift:'#fa7343',Kotlin:'#A97BFF',Shell:'#89e051',
      Nix:'#7e7eff',Haskell:'#5e5086',Lua:'#000080',Zig:'#ec915c',
      HTML:'#e34c26',CSS:'#563d7c',Dart:'#00B4AB',Elixir:'#6e4a7e',
      Scala:'#c22d40',PHP:'#4F5D95',R:'#198CE7',Vue:'#41b883',
    };

    let activeCatId = null;
    let searchTimer = null;

    async function init() {
      await Promise.all([loadStats(), loadCats()]);
      loadRepos(null);
    }

    async function loadStats() {
      const d = await apiFetch('/api/stats');
      document.getElementById('badges').innerHTML =
        `<div class="badge"><strong>${fmt(d.total_repos)}</strong> repos</div>` +
        `<div class="badge"><strong>${fmt(d.total_categories)}</strong> categories</div>`;
      document.getElementById('allCount').textContent = fmt(d.total_repos);
    }

    async function loadCats() {
      const cats = await apiFetch('/api/categories');
      renderList('langList', cats.filter(c => c.category_type === 'language'));
      renderList('topicList', cats.filter(c => c.category_type === 'topic'));
    }

    function renderList(id, cats) {
      document.getElementById(id).innerHTML = cats.map(c =>
        `<div class="cat-item" data-id="${c.id}" onclick="selectCat(${c.id},this)">` +
        `<span class="cat-name">${esc(c.name)}</span>` +
        `<span class="cat-count">${c.count}</span></div>`
      ).join('');
    }

    function selectCat(id, el) {
      activeCatId = id;
      document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('searchInput').value = '';
      clearTimeout(searchTimer);
      loadRepos(id);
    }

    async function loadRepos(catId) {
      setLoading();
      const url = catId != null ? `/api/repos?category_id=${catId}` : '/api/repos';
      const repos = await apiFetch(url);
      renderRepos(repos);
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(searchTimer);
      const q = e.target.value.trim();
      if (!q) { loadRepos(activeCatId); return; }
      searchTimer = setTimeout(async () => {
        setLoading();
        document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('active'));
        const repos = await apiFetch(`/api/search?q=${encodeURIComponent(q)}`);
        renderRepos(repos);
      }, 280);
    });

    function renderRepos(repos) {
      const el = document.getElementById('main');
      if (!repos || repos.length === 0) {
        el.innerHTML = `<div class="empty"><h2>No repos found</h2><p>Try a different search or sync your stars first.</p></div>`;
        return;
      }
      el.innerHTML = `<div class="repos-grid">${repos.map(repoCard).join('')}</div>`;
    }

    function repoCard(r) {
      const topics = parseJson(r.topics_json).slice(0, 4);
      const lc = LANG_COLORS[r.language] || '#8b949e';
      return `<a class="repo-card" href="${esc(r.url)}" target="_blank" rel="noopener noreferrer">` +
        `<div class="repo-name"><span class="repo-owner">${esc(r.owner)}/</span>${esc(r.name)}</div>` +
        (r.description ? `<div class="repo-desc">${esc(r.description)}</div>` : '') +
        `<div class="repo-footer">` +
        (r.language ? `<span class="repo-lang"><span class="lang-dot" style="background:${lc}"></span>${esc(r.language)}</span>` : '') +
        (r.stars_count > 0 ? `<span class="repo-stars">⭐ ${fmt(r.stars_count)}</span>` : '') +
        topics.map(t => `<span class="topic">${esc(t)}</span>`).join('') +
        `</div></a>`;
    }

    function setLoading() {
      document.getElementById('main').innerHTML = '<div class="loading">Loading</div>';
    }

    async function apiFetch(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    function parseJson(s) { try { return JSON.parse(s) || []; } catch { return []; } }
    function fmt(n) {
      if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'')+'M';
      if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';
      return String(n);
    }
    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
