name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'releases/*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ghstars

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon)
          - label: TUI - macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
            feature_flags: ""
            artifact_name: ghstars-tui-macos-arm64

          - label: GUI - macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
            feature_flags: "--features gui --no-default-features"
            artifact_name: ghstars-gui-macos-arm64

          # macOS x86_64 (cross-compiled from ARM64)
          - label: TUI - macOS x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            feature_flags: ""
            artifact_name: ghstars-tui-macos-x86_64

          - label: GUI - macOS x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            feature_flags: "--features gui --no-default-features"
            artifact_name: ghstars-gui-macos-x86_64

          # Linux x86_64
          - label: TUI - Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            feature_flags: ""
            artifact_name: ghstars-tui-linux-x86_64

          - label: GUI - Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            feature_flags: "--features gui --no-default-features"
            artifact_name: ghstars-gui-linux-x86_64

          # Windows x86_64
          - label: TUI - Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            feature_flags: ""
            artifact_name: ghstars-tui-windows-x86_64

          - label: GUI - Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            feature_flags: "--features gui --no-default-features"
            artifact_name: ghstars-gui-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.feature_flags }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-${{ matrix.feature_flags }}-cargo-

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux' && contains(matrix.feature_flags, 'gui')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.feature_flags }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/ghstars ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/ghstars.exe" "${{ matrix.artifact_name }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}${{ runner.os == 'Windows' && '.exe' || '' }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
